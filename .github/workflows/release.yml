name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
      - run: npm run build
      - run: cp styles/main.css styles.css

      - name: Package
        run: |
          mkdir -p copsidian-release
          cp main.js manifest.json styles.css copsidian-release/
          cd copsidian-release && zip -r ../copsidian-${{ github.ref_name }}.zip .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            copsidian-${{ github.ref_name }}.zip
            main.js
            manifest.json
            styles.css
          generate_release_notes: true
